server {
    listen 8080;
    root /usr/share/nginx/html;

    # mirror vite.config.js server.proxy (prefix is stripped, like the rewrites)
    location /api/   { proxy_pass https://nsi.sec.usace.army.mil/nsiapi/;
                       proxy_set_header Host nsi.sec.usace.army.mil; proxy_ssl_server_name on; }
    location /fcc/   { proxy_pass https://geo.fcc.gov/;
                       proxy_set_header Host geo.fcc.gov; proxy_ssl_server_name on; }
    location /tiles/ { proxy_pass https://ml-dev.sec.usace.army.mil/nsi-ml/tileservice/services/nsi-all-pub/tiles/;
                       proxy_set_header Host ml-dev.sec.usace.army.mil; proxy_ssl_server_name on; }

    location / { try_files $uri $uri/ /index.html; }   # SPA fallback
}
